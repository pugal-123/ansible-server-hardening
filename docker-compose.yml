version: '3.8'
services:
  ubuntu-server:
    image: ubuntu:22.04
    container_name: hardened-server
    platform: linux/amd64
    privileged: true
    volumes:
      - ./:/ansible
    command: >
      bash -c "apt-get update && 
               apt-get install -y python3 python3-pip openssh-server sudo &&
               service ssh start &&
               tail -f /dev/null"
    networks:
      - ansible-net

networks:
  ansible-net:
    driver: bridge
