---
- name: Server Hardening Playbook
  hosts: servers
  become: yes
  gather_facts: yes

  roles:
    - common
    - security
    - ssh
    - firewall

  post_tasks:
    - name: Print hardening complete message
      debug:
        msg: |
          ✅ Server hardening complete!
          Host: {{ inventory_hostname }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          All security roles applied successfully.
